<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homology calculator</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="section">
        <div class="toolbar">
          <div class="history-toolbar">
            <button id="undo-button" class="secondary icon-only-button" disabled aria-label="되돌리기" title="되돌리기">
              <img src="./assets/undo.svg" alt="" />
            </button>

            <button id="redo-button" class="secondary icon-only-button" disabled aria-label="다시하기" title="다시하기">
              <img src="./assets/redo.svg" alt="" />
            </button>
          </div>

          <button id="mode-select" class="active">선택 모드</button>
          <button id="mode-add-point">점 추가</button>
          <button id="mode-add-line">선 추가</button>
          <button id="mode-add-face">면 추가</button>
        </div>

        <div class="toolbar" style="margin-top: 12px;">
          <button id="apply-glue" class="secondary" disabled>붙이기</button>
          <button id="reset-all" class="secondary">전체 리셋</button>
        </div>
      </div>

      <div class="section">
        <h2>H_0</h2>
        <div class="algebra-card">
          <div class="algebra-row">
            <div class="algebra-label">ker ∂_0의 기저</div>
            <div class="algebra-value" id="h0-ker-basis">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">ker ∂_0와 동형인 군</div>
            <div class="algebra-value" id="h0-ker-group">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">im ∂_1의 기저</div>
            <div class="algebra-value" id="h0-im-basis">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">im ∂_1와 동형인 군</div>
            <div class="algebra-value" id="h0-im-group">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">H_0</div>
            <div class="algebra-value" id="h0-group">표시 예정</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <svg id="board" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid meet"></svg>

      <div class="overlay">
        <div id="mode-chip" class="chip">모드: 선택</div>
        <div id="tooltip" class="tooltip"></div>
      </div>
    </main>

    <aside class="inspector">
      <h1>Homology</h1>

      <div class="section">
        <h2>H_1</h2>
        <div class="algebra-card">
          <div class="algebra-row">
            <div class="algebra-label">ker ∂_1의 기저</div>
            <div class="algebra-value" id="h1-ker-basis">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">ker ∂_1와 동형인 군</div>
            <div class="algebra-value" id="h1-ker-group">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">im ∂_2의 기저</div>
            <div class="algebra-value" id="h1-im-basis">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">im ∂_2와 동형인 군</div>
            <div class="algebra-value" id="h1-im-group">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">H_1</div>
            <div class="algebra-value" id="h1-group">표시 예정</div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>H_2</h2>
        <div class="algebra-card">
          <div class="algebra-row">
            <div class="algebra-label">ker ∂_2의 기저</div>
            <div class="algebra-value" id="h2-ker-basis">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">ker ∂_2와 동형인 군</div>
            <div class="algebra-value" id="h2-ker-group">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">im ∂_3의 기저</div>
            <div class="algebra-value" id="h2-im-basis">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">im ∂_3와 동형인 군</div>
            <div class="algebra-value" id="h2-im-group">표시 예정</div>
          </div>
          <div class="algebra-row">
            <div class="algebra-label">H_2</div>
            <div class="algebra-value" id="h2-group">표시 예정</div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
